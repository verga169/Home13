<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Home13</title>
    <style>
        :root {
            --bg: #eef2f1;
            --card: #ffffff;
            --ink: #1f2c28;
            --muted: #5f6b66;
            --line: #d8ddd8;
            --brand: #0f766e;
            --brand-dark: #0b4f4a;
            --danger-bg: #fee2e2;
            --danger-ink: #7f1d1d;
            --shadow: 0 14px 32px rgba(18, 36, 31, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: "DM Sans", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(15, 118, 110, 0.16), transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(79, 155, 146, 0.14), transparent 40%),
                var(--bg);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 22px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .error {
            margin: 0 0 14px;
            border: 1px solid #fecaca;
            background: var(--danger-bg);
            color: var(--danger-ink);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 0.92rem;
        }

        .fields {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.88rem;
            color: var(--muted);
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            font: inherit;
            color: var(--ink);
            min-height: 42px;
        }

        input:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.5);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            padding: 11px 14px;
            color: #fff;
            background: var(--brand);
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--brand-dark);
        }

        .hint {
            margin-top: 12px;
            font-size: 0.83rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Home13 Login</h1>
        <p>Inserisci le credenziali per accedere all'app.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login', next=next_path) }}">
            <input type="hidden" name="next" value="{{ next_path }}">
            <div class="fields">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
            </div>
            <button class="btn" type="submit">Accedi</button>
        </form>

        <div class="hint">Utente configurato: <strong>{{ default_username }}</strong></div>
    </main>
</body>
</html>
